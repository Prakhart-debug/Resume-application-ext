<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Resume Tailor — Settings</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      max-width: 680px;
      margin: 40px auto;
      padding: 0 20px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 14px;
      color: #1a1a1a;
      background: #f9f9f9;
    }
    h1 { font-size: 22px; margin-bottom: 6px; }
    .subtitle { color: #666; margin-bottom: 28px; }
    label { display: block; font-weight: 600; margin-bottom: 6px; }
    .hint { font-size: 12px; color: #888; margin-bottom: 8px; }
    input[type="text"], input[type="password"] {
      width: 100%;
      padding: 9px 12px;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 14px;
      margin-bottom: 20px;
      background: #fff;
    }
    textarea {
      width: 100%;
      height: 320px;
      padding: 10px 12px;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 13px;
      font-family: 'Courier New', monospace;
      resize: vertical;
      background: #fff;
      margin-bottom: 20px;
    }
    button {
      padding: 10px 24px;
      background: #0a66c2;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }
    button:hover { background: #0853a0; }
    #saveStatus {
      display: inline-block;
      margin-left: 14px;
      font-size: 13px;
      color: #1a7f1a;
      opacity: 0;
      transition: opacity 0.3s;
    }
    #saveStatus.visible { opacity: 1; }
    .section { margin-bottom: 28px; }
  </style>
</head>
<body>
  <h1>Settings</h1>
  <p class="subtitle">Configure your API key and base resume.</p>

  <div class="section">
    <label for="apiKey">Gemini API Key</label>
    <p class="hint">Get your key at aistudio.google.com. It's stored locally and never shared.</p>
    <input type="password" id="apiKey" placeholder="AIza…" autocomplete="off" />
  </div>

  <div class="section">
    <label for="baseResume">Base Resume</label>
    <p class="hint">Paste your resume as plain text. This is what Claude will tailor for each job.</p>
    <textarea id="baseResume" placeholder="Paste your resume here…"></textarea>
  </div>

  <button id="saveBtn">Save Settings</button>
  <span id="saveStatus">Saved!</span>

  <script src="settings.js"></script>
</body>
</html>
