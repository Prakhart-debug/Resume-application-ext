<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Resume Tailor</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 420px;
      min-height: 200px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 14px;
      color: #1a1a1a;
      padding: 16px;
      background: #f9f9f9;
    }
    h1 { font-size: 18px; margin-bottom: 4px; }
    .subtitle { color: #666; font-size: 12px; margin-bottom: 14px; }
    .status-bar {
      background: #e8f4fd;
      border: 1px solid #b3d8f5;
      border-radius: 6px;
      padding: 8px 12px;
      font-size: 12px;
      color: #1a5f8a;
      margin-bottom: 14px;
    }
    .status-bar.error { background: #fdecea; border-color: #f5b3b3; color: #8a1a1a; }
    .status-bar.success { background: #eafde8; border-color: #b3f5b3; color: #1a5f1a; }
    button {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
      transition: background 0.15s;
    }
    #tailorBtn {
      background: #0a66c2;
      color: #fff;
      margin-bottom: 10px;
    }
    #tailorBtn:hover:not(:disabled) { background: #0853a0; }
    #tailorBtn:disabled { background: #a0b8d8; cursor: not-allowed; }
    #settingsBtn {
      background: #fff;
      color: #0a66c2;
      border: 1px solid #0a66c2;
    }
    #settingsBtn:hover { background: #e8f0f8; }
    /* setup panel */
    #setupPanel {
      background: #fffbea;
      border: 1px solid #f0c040;
      border-radius: 8px;
      padding: 14px;
      margin-bottom: 14px;
    }
    #setupPanel h2 { font-size: 13px; font-weight: 700; margin-bottom: 10px; color: #7a5500; }
    .setup-field { margin-bottom: 10px; }
    .setup-field label { display: block; font-size: 12px; font-weight: 600; color: #555; margin-bottom: 4px; }
    .setup-field input {
      width: 100%; padding: 7px 10px; border: 1px solid #ccc;
      border-radius: 5px; font-size: 13px; background: #fff;
    }
    .setup-field textarea {
      width: 100%; height: 130px; padding: 7px 10px; border: 1px solid #ccc;
      border-radius: 5px; font-size: 12px; font-family: 'Courier New', monospace;
      resize: vertical; background: #fff;
    }
    #saveSetupBtn {
      width: 100%; padding: 9px; background: #0a66c2; color: #fff;
      border: none; border-radius: 6px; font-size: 13px; font-weight: 600; cursor: pointer;
    }
    #saveSetupBtn:hover { background: #0853a0; }
    #setupSaveStatus { font-size: 12px; color: #1a7f1a; margin-top: 6px; display: none; }
    .section { margin-top: 16px; }
    .section-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 6px;
    }
    .section-header h2 { font-size: 13px; font-weight: 700; text-transform: uppercase; color: #555; }
    .copy-btn {
      width: auto;
      padding: 4px 10px;
      font-size: 11px;
      font-weight: 500;
      background: #f0f0f0;
      color: #333;
      border: 1px solid #ccc;
      border-radius: 4px;
    }
    .copy-btn:hover { background: #e0e0e0; }
    #downloadCoverBtn {
      background: #fff;
      color: #1a7f1a;
      border: 1px solid #1a7f1a;
      margin-top: 8px;
      display: none;
    }
    #downloadCoverBtn:hover { background: #eafde8; }
    .output-box {
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 6px;
      padding: 10px;
      white-space: pre-wrap;
      font-size: 13px;
      line-height: 1.5;
      max-height: 220px;
      overflow-y: auto;
      color: #222;
    }
    #results { display: none; }
    #spinner { display: none; text-align: center; color: #666; padding: 12px 0; font-size: 13px; }
  </style>
</head>
<body>
  <h1>Resume Tailor</h1>
  <p class="subtitle">Powered by Gemini AI</p>

  <!-- Setup panel — shown when API key or resume is missing -->
  <div id="setupPanel" style="display:none;">
    <h2>⚠ Setup required</h2>
    <div class="setup-field">
      <label for="setupApiKey">Gemini API Key</label>
      <input type="password" id="setupApiKey" placeholder="AIza…" autocomplete="off" />
    </div>
    <div class="setup-field">
      <label for="setupResume">Base Resume (plain text)</label>
      <textarea id="setupResume" placeholder="Paste your full resume here…"></textarea>
    </div>
    <button id="saveSetupBtn">Save &amp; Continue</button>
    <div id="setupSaveStatus">Saved! You can now tailor your resume.</div>
  </div>

  <div id="statusBar" class="status-bar">Detecting job description…</div>

  <div id="spinner">Tailoring your resume, please wait…</div>

  <button id="tailorBtn" disabled>Tailor My Resume</button>
  <button id="settingsBtn">⚙ Edit Settings</button>

  <div id="results">
    <div class="section">
      <div class="section-header">
        <h2>Tailored Bullet Points</h2>
        <button class="copy-btn" data-target="bulletOutput">Copy</button>
      </div>
      <div id="bulletOutput" class="output-box"></div>
    </div>

    <div class="section">
      <div class="section-header">
        <h2>Cover Letter</h2>
        <button class="copy-btn" data-target="coverOutput">Copy</button>
      </div>
      <div id="coverOutput" class="output-box"></div>
    </div>

    <button id="downloadCoverBtn">⬇ Download Cover Letter</button>
  </div>

  <script src="popup.js"></script>
</body>
</html>
